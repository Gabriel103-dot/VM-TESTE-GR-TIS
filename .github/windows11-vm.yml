name: Windows 11 VM Otimizada 2026

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Configurando o Ngrok e Ambiente
      run: |
        # Instala o ngrok de forma limpa pelo Chocolatey
        choco install ngrok -y
        
        # Define o token de autenticação
        ngrok authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
      shell: powershell

    - name: Ativando o Acesso Remoto (RDP)
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
      shell: powershell

    - name: Criando Tunnel e Buscando Dados de Login
      run: |
        # Inicializa o ngrok forçando os argumentos corretos em segundo plano
        Start-Process ngrok -ArgumentList "tcp 3389 --region sa" -NoNewWindow
        
        # Espera 30 segundos para o túnel estabilizar e gerar o IP
        Start-Sleep -Seconds 30
        
        # Puxa o link gerado diretamente da API local
        $connections = Invoke-RestMethod http://localhost:4040/api/tunnels
        $address = $connections.tunnels.public_url -replace "tcp://", ""
        
        Write-Host "=========================================================="
        Write-Host "CONECTE-SE VIA RDP (CONEXÃO DE ÁREA DE TRABALHO REMOTA)"
        Write-Host "Endereço IP: $address"
        Write-Host "Usuário: runneradmin"
        Write-Host "=========================================================="
      shell: powershell

    - name: Kit de Otimização e Tweaks
      run: |
        Remove-Item -Path "C:\Windows\Temp\*" -Recurse -Force -ErrorAction SilentlyContinue
        choco install vcredist-all -y
      shell: powershell

    - name: Manter VM Viva
      run: |
        $ServerLoop = Start-Job -ScriptBlock { while ($true) { Start-Sleep -Seconds 60 } }
        Wait-Job $ServerLoop
      shell: powershell
        $connections = Invoke-RestMethod http://localhost:4040/api/tunnels
        $address = $connections.tunnels.public_url -replace "tcp://", ""
        
        Write-Host "=========================================================="
        Write-Host "CONECTE-SE VIA RDP (CONEXÃO DE ÁREA DE TRABALHO REMOTA)"
        Write-Host "Endereço IP: $address"
        Write-Host "Usuário: runneradmin"
        Write-Host "=========================================================="
      shell: powershell


    - name: Kit de Otimização e Tweaks
      run: |
        Remove-Item -Path "C:\Windows\Temp\*" -Recurse -Force -ErrorAction SilentlyContinue
        choco install vcredist-all -y
      shell: powershell

    - name: Manter VM Viva
      run: |
        $ServerLoop = Start-Job -ScriptBlock { while ($true) { Start-Sleep -Seconds 60 } }
        Wait-Job $ServerLoop
      shell: powershell
        $address = $connections.tunnels.public_url -replace "tcp://", ""
        
        Write-Host "=========================================================="
        Write-Host "CONECTE-SE VIA RDP (CONEXÃO DE ÁREA DE TRABALHO REMOTA)"
        Write-Host "Endereço IP: $address"
        Write-Host "Usuário: runneradmin"
        Write-Host "=========================================================="
      shell: powershell

    - name: Kit de Otimização e Tweaks
      run: |
        Write-Host "Limpando arquivos temporários para maximizar espaço livre..."
        Remove-Item -Path "C:\Windows\Temp\*" -Recurse -Force -ErrorAction SilentlyContinue
        
        Write-Host "Instalando Componentes Essenciais..."
        choco install vcredist-all -y
      shell: powershell

    - name: Manter VM Viva
      run: |
        $ServerLoop = Start-Job -ScriptBlock { while ($true) { Start-Sleep -Seconds 60 } }
        Wait-Job $ServerLoop
      shell: powershell
        $address = $connections.tunnels.public_url -replace "tcp://", ""
        
        Write-Host "=========================================================="
        Write-Host "CONECTE-SE VIA RDP (CONEXÃO DE ÁREA DE TRABALHO REMOTA)"
        Write-Host "Endereço IP: $address"
        Write-Host "Usuário: runneradmin"
        Write-Host "=========================================================="
      shell: powershell


    -     - name: Kit de Otimização e Tweaks para Jogos/Desempenho
      run: |
        Write-Host "Limpando arquivos temporários para maximizar espaço livre..."
        Remove-Item -Path "C:\Windows\Temp\*" -Recurse -Force -ErrorAction SilentlyContinue
        
        Write-Host "Instalando Componentes Essenciais..."
        choco install vcredist-all -y
      shell: powershell


    -    - name: Obter Dados de Login
      run: |
        # Dá um tempo maior para o Ngrok abrir o túnel em segundo plano
        Start-Sleep -Seconds 15
        $connections = Invoke-RestMethod http://localhost:4040/api/tunnels
        $address = $connections.tunnels.public_url -replace "tcp://", ""
        Write-Host "=========================================================="
        Write-Host "CONECTE-SE VIA RDP (CONEXÃO DE ÁREA DE TRABALHO REMOTA)"
        Write-Host "Endereço IP: $address"
        Write-Host "Usuário: runneradmin"
        Write-Host "=========================================================="
      shell: powershell


    - name: Manter VM Viva
      run: |
        $ServerLoop = Start-Job -ScriptBlock { while ($true) { Start-Sleep -Seconds 60 } }
        Wait-Job $ServerLoop
      shell: powershell
      
