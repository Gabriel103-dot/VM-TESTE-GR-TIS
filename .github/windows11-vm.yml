name: Windows 11 VM Otimizada 2026

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Baixando e Configurando o Ngrok via WinGet
      run: |
        # Instala o ngrok de forma oficial e silenciosa pelo gerenciador do Windows
        winget install ngrok.ngrok --accept-source-agreements --accept-package-agreements
        
        # Recarrega as variáveis de ambiente para o PowerShell encontrar o comando ngrok
        $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
        
        # Aplica o token de autenticação
        ngrok authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
      shell: powershell

    - name: Ativando o Acesso Remoto (RDP)
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
      shell: powershell

    - name: Criando Túnel de Conexão
      run: |
        $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
        Start-Process ngrok -ArgumentList "tcp 3389"
      shell: powershell

    - name: Kit de Otimização e Tweaks para Jogos/Desempenho
      run: |
        Write-Host "Limpando arquivos temporários para maximizar espaço livre..."
        Remove-Item -Path "C:\Windows\Temp\*" -Recurse -Force -ErrorAction SilentlyContinue
        
        Write-Host "Instalando Gerenciador de Pacotes Chocolatey..."
        Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
        
        Write-Host "Instalando Componentes Essenciais para Jogos e Scripts..."
        choco install vcredist-all directx -y
      shell: powershell

    - name: Obter Dados de Login
      run: |
        Start-Sleep -Seconds 5
        $connections = Invoke-RestMethod http://localhost:4040/api/tunnels
        $address = $connections.tunnels.public_url -replace "tcp://", ""
        Write-Host "=========================================================="
        Write-Host "CONECTE-SE VIA RDP (CONEXÃO DE ÁREA DE TRABALHO REMOTA)"
        Write-Host "Endereço IP: $address"
        Write-Host "Usuário: runneradmin"
        Write-Host "=========================================================="
      shell: powershell

    - name: Manter VM Viva
      run: |
        $ServerLoop = Start-Job -ScriptBlock { while ($true) { Start-Sleep -Seconds 60 } }
        Wait-Job $ServerLoop
      shell: powershell
        Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
        
        Write-Host "Instalando Componentes Essenciais para Jogos e Scripts..."
        choco install vcredist-all directx -y
      shell: powershell

